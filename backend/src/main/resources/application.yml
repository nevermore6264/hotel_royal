spring:
  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 40MB
  application:
    name: hotel-royal-api
  datasource:
    url: jdbc:mysql://localhost:3306/hotel_royal?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: 12345678
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:vansinhmb3@gmail.com}
    password: ${MAIL_PASSWORD:qymhoypnxyemgsej}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8090}
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:RoyalLotusHotelSecretKeyForJWTTokenGeneration2024MustBeLongEnough}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

payment:
  payos:
    client-id: ${PAYOS_CLIENT_ID:770731f5-b8a1-4587-a825-8357de043a2b}
    api-key: ${PAYOS_API_KEY:ad3d2e7b-8a4c-4f9a-9b71-8c613f6a3286}
    checksum-key: ${PAYOS_CHECKSUM_KEY:dc139ea2e85c1e2afda6e7e5327ba19152381a908aed5ecc1f547f9ea379bfdb}
    api-url: ${PAYOS_API_URL:https://api-merchant.payos.vn}
    che-do-thu: ${PAYOS_DEV_MODE:false}
    # Tỷ lệ đặt cọc (%) so với tổng tiền kỳ lưu trú khi khách chọn PayOS — đặt cọc
    ty-le-coc-phan-tram: ${PAYOS_TY_LE_COC:30}

app:
  upload:
    root: ${APP_UPLOAD_DIR:uploads}
  # Đơn CHO_DUYET chưa thanh toán sẽ tự hủy sau khoảng thời gian này (phút). Đặt 0 để tắt.
  dat-phong:
    phut-giu-cho-thanh-toan: ${APP_PHUT_GIU_CHO_THANH_TOAN:30}
    # Khoảng cách giữa các lần quét hủy quá hạn (giây)
    tan-so-quet-giay: ${APP_QUET_HUY_DAT_PHONG_GIAY:60}

logging:
  level:
    com.royallotushotel: DEBUG
    org.springframework.security: INFO
