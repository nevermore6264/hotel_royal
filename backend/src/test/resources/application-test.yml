server:
  servlet:
    context-path: /api

spring:
  task:
    scheduling:
      enabled: false
  datasource:
    url: jdbc:h2:mem:hotel_royal_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  mail:
    host: localhost
    port: 2525

jwt:
  secret: test-secret-key-test-secret-key-test-secret-key
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

payment:
  payos:
    client-id: test-client
    api-key: test-api-key
    checksum-key: test-checksum-key
    api-url: https://api-merchant.payos.vn
    che-do-thu: true
